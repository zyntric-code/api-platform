# Production compose: pulls the prebuilt image from GHCR instead of building on the server.
#
# First deploy:
#   1. cp .env.example .env
#   2. Edit .env and set strong secrets
#   3. docker compose -f docker-compose.prod.yml pull
#   4. docker compose -f docker-compose.prod.yml up -d
#
# Update deploy:
#   docker compose -f docker-compose.prod.yml pull new-api
#   docker compose -f docker-compose.prod.yml up -d

services:
  new-api:
    image: ${NEW_API_IMAGE:-ghcr.io/viper-leo404/new-api:latest}
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET in .env}
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-node-1
    depends_on:
      - redis
      - postgres
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network

volumes:
  pg_data:

networks:
  new-api-network:
    driver: bridge
